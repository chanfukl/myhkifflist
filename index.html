<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKIFF50 排片助手</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+TC:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090805;--bg2:#100e09;--bg3:#181410;
  --gold:#c9a84c;--gold2:#e8c96a;--red:#c0392b;
  --cream:#f5ead8;--muted:#7a6e5f;--text:#e8dfd0;
  --border:rgba(201,168,76,0.16);
  --ok:#4caf84;--tight:#e8a83a;--bad:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;font-size:15px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

.notice{background:linear-gradient(90deg,rgba(74,144,88,.1),rgba(74,144,88,.05));border-bottom:1px solid rgba(74,144,88,.25);padding:8px 28px;font-family:'Space Mono',monospace;font-size:11px;color:var(--ok);letter-spacing:.03em;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.notice a{color:var(--gold);text-decoration:underline}
.notice .sep{color:rgba(74,144,88,.3)}

header{padding:20px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,#0c0a06 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.lb{display:flex;align-items:baseline;gap:9px}
.lh{font-family:'Playfair Display',serif;font-size:25px;font-weight:900;color:var(--gold);letter-spacing:.05em}
.l50{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;color:var(--red);text-shadow:0 0 16px rgba(192,57,43,.4)}
.ls{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;font-family:'Space Mono',monospace}
.hd{width:1px;height:34px;background:var(--border);flex-shrink:0}
.hm{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;line-height:1.7}
.nav-tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.nav-tab{padding:8px 18px;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:1px solid transparent;border-radius:2px;transition:all .2s;background:none;white-space:nowrap}
.nav-tab:hover{color:var(--gold);border-color:var(--border)}
.nav-tab.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.07)}
.plan-cnt{background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:4px;display:none}
.plan-cnt.show{display:inline}

.view{display:none}.view.active{display:block}

/* TIMELINE */
#view-timeline{padding:20px 28px}
.tl-ctrl{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.dsel{display:flex;gap:4px;flex-wrap:wrap}
.dbtn{padding:6px 13px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:all .2s}
.dbtn:hover{color:var(--text);border-color:rgba(201,168,76,.35)}
.dbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08)}
.legend{display:flex;gap:12px;margin-left:auto;align-items:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.ldot{width:9px;height:9px;border-radius:1px;flex-shrink:0}
.tl-wrap{overflow-x:auto;padding-bottom:8px;width:100%}
.tl-grid{min-width:900px;width:max-content}
.h-ruler{display:flex;margin-left:112px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.hcell{flex:0 0 72px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);position:relative}
.hcell::before{content:'';position:absolute;top:100%;left:0;width:1px;height:4px;background:var(--border)}
.vrow{display:flex;align-items:center;margin-bottom:7px}
.vlbl{flex:0 0 112px;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;padding-right:8px;line-height:1.3;flex-shrink:0}
.vtrack{flex:1;height:46px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;position:relative;overflow:visible}
.vtrack::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 71px,rgba(201,168,76,.04) 71px,rgba(201,168,76,.04) 72px);pointer-events:none}
.sb{position:absolute;top:4px;height:38px;border-radius:2px;cursor:pointer;display:flex;align-items:center;padding:0 6px;overflow:hidden;transition:all .2s;border:1px solid transparent;z-index:2;min-width:32px}
.sb:hover{z-index:10;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.5);border-color:rgba(201,168,76,.7)!important}
.sb.inplan{outline:2px solid var(--gold2);outline-offset:1px}
.bt{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-family:'Noto Serif TC',serif;flex:1;min-width:0}
.btm{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.5);white-space:nowrap;padding-left:3px;flex-shrink:0}
.s-op{background:linear-gradient(135deg,rgba(192,57,43,.82),rgba(192,57,43,.5))}
.s-ga{background:linear-gradient(135deg,rgba(190,155,55,.82),rgba(190,155,55,.5))}
.s-la{background:linear-gradient(135deg,rgba(52,105,167,.82),rgba(52,105,167,.5))}
.s-ma{background:linear-gradient(135deg,rgba(60,130,155,.82),rgba(60,130,155,.5))}
.s-ci{background:linear-gradient(135deg,rgba(74,144,88,.82),rgba(74,144,88,.5))}
.s-re{background:linear-gradient(135deg,rgba(120,88,165,.82),rgba(120,88,165,.5))}
.s-hk{background:linear-gradient(135deg,rgba(200,80,60,.82),rgba(200,80,60,.5))}
.s-fo{background:linear-gradient(135deg,rgba(155,105,35,.82),rgba(155,105,35,.5))}
.s-mi{background:linear-gradient(135deg,rgba(55,105,140,.82),rgba(55,105,140,.5))}
.s-sc{background:linear-gradient(135deg,rgba(100,80,140,.82),rgba(100,80,140,.5))}
.s-po{background:linear-gradient(135deg,rgba(75,110,70,.82),rgba(75,110,70,.5))}
.s-wo{background:linear-gradient(135deg,rgba(85,125,100,.82),rgba(85,125,100,.5))}
.s-an{background:linear-gradient(135deg,rgba(140,80,80,.82),rgba(140,80,80,.5))}
.s-fi{background:linear-gradient(135deg,rgba(70,100,130,.82),rgba(70,100,130,.5))}
.s-ot{background:linear-gradient(135deg,rgba(80,80,80,.82),rgba(80,80,80,.5))}

/* PLAN */
#view-plan{padding:20px 28px}
.ph{display:flex;align-items:baseline;gap:16px;margin-bottom:20px}
.pt{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold)}
.pst{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.plist{display:flex;flex-direction:column;gap:9px;max-width:940px}
.pi{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:13px 17px;display:flex;gap:16px;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.pi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.pi:hover{border-color:rgba(201,168,76,.4)}
.pi-time{font-family:'Space Mono',monospace;font-size:14px;color:var(--gold);min-width:62px;flex-shrink:0}
.pi-dlbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.07em}
.pi-title{font-size:14px;font-weight:600;color:var(--cream)}
.pi-meta{font-size:12px;color:var(--muted);margin-top:3px}
.pi-venue{margin-left:auto;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;padding-left:10px;min-width:90px}
.rmbtn{background:none;border:1px solid rgba(192,57,43,.28);color:rgba(192,57,43,.55);font-size:11px;cursor:pointer;border-radius:2px;padding:3px 8px;font-family:'Space Mono',monospace;transition:all .2s;margin-left:8px;flex-shrink:0}
.rmbtn:hover{border-color:var(--red);color:var(--red)}
.tw{border-radius:3px;padding:7px 13px 7px 16px;display:flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:11px;max-width:940px}
.tw.ok{border:1px solid rgba(76,175,132,.28);background:rgba(76,175,132,.05);color:var(--ok)}
.tw.tight{border:1px solid rgba(232,168,58,.32);background:rgba(232,168,58,.06);color:var(--tight)}
.tw.bad{border:1px solid rgba(192,57,43,.32);background:rgba(192,57,43,.06);color:var(--bad)}
.daysep{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:6px 0 3px;border-top:1px solid var(--border);margin-top:2px}

/* FILMS */
#view-films{padding:20px 28px}
.ff{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.ff-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-right:4px}
.fb{padding:5px 12px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:none;color:var(--muted);transition:all .2s;white-space:nowrap}
.fb:hover{color:var(--text);border-color:rgba(201,168,76,.3)}.fb.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.07)}
.films-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}
.search-wrap{margin-bottom:16px}
.search-input{background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:9px 14px;font-family:'Noto Serif TC',serif;font-size:14px;color:var(--text);width:300px;outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(201,168,76,.4)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.fc:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.4)}
.fc-header{padding:12px 13px 9px;display:flex;gap:10px;align-items:flex-start}
.fc-code{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em;flex-shrink:0;margin-top:3px}
.fc-titles{flex:1;min-width:0}
.fc-zh{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:2px}
.fc-en{font-size:11px;color:var(--muted);font-style:italic;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-meta{padding:0 13px 9px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border);padding:2px 6px;border-radius:2px;white-space:nowrap}
.tag.gold{color:var(--gold);border-color:rgba(201,168,76,.32)}
.tag.ok{color:var(--ok);border-color:rgba(76,175,132,.32)}
.tag.sec{color:#fff;border:none;padding:2px 7px}
.fc-bottom{padding:8px 13px 11px;margin-top:auto;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.fc-dir{font-size:11px;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dur-row{display:flex;align-items:center;gap:6px}
.dur-bar{width:50px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;flex-shrink:0}
.dur-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px}
.dur-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.fc-add{padding:4px 10px;font-family:'Space Mono',monospace;font-size:10px;border:1px solid rgba(201,168,76,.38);border-radius:2px;color:var(--gold);background:none;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.fc-add:hover{background:rgba(201,168,76,.1)}.fc-add.added{border-color:var(--ok);color:var(--ok)}
.fc-db{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold)}

/* VENUES PAGE */
#view-venues{padding:20px 28px}
.venues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;max-width:1200px}
.venue-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.venue-card-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.venue-code-badge{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;width:44px;height:44px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;letter-spacing:.05em}
.venue-info{flex:1}
.venue-name-zh{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--cream);margin-bottom:3px}
.venue-name-en{font-size:12px;color:var(--muted);font-style:italic}
.venue-card-body{padding:14px 18px}
.venue-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.venue-row-icon{font-size:14px;flex-shrink:0;margin-top:1px;width:20px}
.venue-row-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;min-width:50px;flex-shrink:0;margin-top:2px}
.venue-row-val{font-size:13px;color:var(--text);line-height:1.5}
.venue-row-val a{color:var(--gold);text-decoration:none}
.venue-row-val a:hover{text-decoration:underline}
.venue-transit{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.venue-transit-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.transit-chips{display:flex;flex-wrap:wrap;gap:5px}
.tc{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:2px;white-space:nowrap}
.tc.fast{background:rgba(76,175,132,.12);color:var(--ok);border:1px solid rgba(76,175,132,.25)}
.tc.mid{background:rgba(232,168,58,.1);color:var(--tight);border:1px solid rgba(232,168,58,.22)}
.tc.slow{background:rgba(192,57,43,.1);color:var(--bad);border:1px solid rgba(192,57,43,.22)}
.map-hint{margin-top:12px;padding:10px 12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:3px;font-size:12px;color:var(--muted);line-height:1.6}
.map-hint strong{color:var(--gold)}
.venues-tip{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.7;max-width:800px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:3px}
.venues-tip span{color:var(--ok)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.mo.open{display:flex}
.mc{background:var(--bg2);border:1px solid rgba(201,168,76,.25);border-radius:5px;max-width:840px;width:100%;margin:auto;position:relative;animation:mIn .22s ease-out;flex-shrink:0}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhero{padding:22px 22px 16px;border-bottom:1px solid var(--border);display:flex;gap:18px;align-items:flex-start}
.mhero-left{flex:1;min-width:0}
.msec-badge{display:inline-flex;align-items:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:10px;color:#fff}
.m-zh{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--cream);line-height:1.2;margin-bottom:4px}
.m-en{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:6px}
.m-dblink{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);text-decoration:none;border:1px solid rgba(201,168,76,.3);padding:2px 9px;border-radius:2px;transition:all .2s}
.m-dblink:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}
.mhero-right{text-align:right;flex-shrink:0;min-width:90px}
.m-score{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:var(--gold);line-height:1}
.m-score-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}
.mcls{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:10;transition:all .2s}
.mcls:hover{color:var(--gold);border-color:var(--gold)}
.mbody{padding:18px 22px}
.mirow{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.mii{font-family:'Space Mono',monospace;font-size:11px}
.mill{color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:9px;margin-bottom:3px}
.miv{color:var(--text)}
.det-section{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:15px 17px;margin-bottom:15px}
.det-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.det-sy{font-size:14px;line-height:1.85;color:var(--text);opacity:.88;margin-bottom:10px}
.det-hl{display:flex;flex-direction:column;gap:6px}
.det-hli{display:flex;gap:8px;font-size:13px;color:var(--text);opacity:.85;line-height:1.5}
.det-hli::before{content:'◆';color:var(--gold);font-size:10px;flex-shrink:0;margin-top:3px}
.msec-ttl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sclist{display:flex;flex-direction:column;gap:5px}
.sci{display:flex;align-items:center;gap:11px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:border-color .2s;flex-wrap:wrap}
.sci:hover{border-color:rgba(201,168,76,.4)}
.sc-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);min-width:48px;flex-shrink:0}
.sc-time{font-family:'Space Mono',monospace;font-size:13px;color:var(--text);min-width:124px;flex-shrink:0}
.sc-venue{font-size:12px;color:var(--muted);flex:1}
.sc-code{font-family:'Space Mono',monospace;font-size:9px;color:var(--bg3);background:var(--muted);padding:1px 5px;border-radius:1px;flex-shrink:0;opacity:.45}
.sc-add{margin-left:auto;padding:4px 10px;font-family:'Space Mono',monospace;font-size:10px;border:1px solid rgba(201,168,76,.38);border-radius:2px;color:var(--gold);background:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.sc-add:hover{background:rgba(201,168,76,.1)}.sc-add.added{border-color:var(--ok);color:var(--ok)}
/* TRANSPORT BAR */
.transport-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;max-width:940px}
.tbtn{padding:6px 14px;font-family:'Space Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:none;color:var(--muted);transition:all .2s}
.tbtn:hover{color:var(--text);border-color:rgba(201,168,76,.35)}.tbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08)}.tbtn.active.buf{color:#4caf84;border-color:#4caf84;background:rgba(76,175,132,.08)}
.export-btn{margin-left:auto;padding:7px 16px;font-family:'Space Mono',monospace;font-size:11px;border:1px solid rgba(201,168,76,.4);border-radius:2px;color:var(--gold);background:none;cursor:pointer;transition:all .2s}
.export-btn:hover{background:rgba(201,168,76,.1)}
/* SCREENING BADGES */
.sc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.sc-badge{font-family:'Space Mono',monospace;font-size:9px;padding:1px 6px;border-radius:2px;border:1px solid;white-space:nowrap}
.sc-badge.sub{color:#6090d0;border-color:rgba(96,144,208,.35);background:rgba(96,144,208,.08)}
.sc-badge.qa{color:var(--ok);border-color:rgba(76,175,132,.35);background:rgba(76,175,132,.08)}
.sc-badge.pre{color:var(--gold);border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.08)}
/* VENUE MATRIX */
.matrix-wrap{overflow-x:auto;margin-top:22px}
.mx-table{border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px;min-width:600px}
.mx-table th,.mx-table td{border:1px solid var(--border);padding:7px 11px;text-align:center;white-space:nowrap}
.mx-table th{background:var(--bg3);color:var(--gold);font-size:10px}
.mx-table .mx-self{background:var(--bg3);color:var(--muted)}
.mx-table .mx-fast{background:rgba(76,175,132,.1);color:var(--ok)}
.mx-table .mx-mid{background:rgba(232,168,58,.08);color:var(--tight)}
.mx-table .mx-slow{background:rgba(192,57,43,.08);color:var(--bad)}
/* PRINT */
@media print{.notice,.nav-tabs,.hd,.export-btn,.transport-bar,.rmbtn,.mcls{display:none!important}body{background:#fff;color:#000}.pi{border:1px solid #ccc;page-break-inside:avoid}.tw{page-break-inside:avoid}}
.e-ic{font-size:40px;margin-bottom:12px}.e-ttl{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:6px}.e-sub{font-size:13px;opacity:.55}
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--gold);border-radius:3px;padding:9px 16px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);z-index:500;transform:translateY(14px);opacity:0;transition:all .25s;pointer-events:none;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--gold)}
</style>
